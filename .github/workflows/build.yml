name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  Build:
    runs-on: windows-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
        
    - name: Build 
      shell: bash
      run: |
        g++ patch_ga.cpp -o patch_ga.exe -static
        g++ patch_li.cpp -o patch_li.exe -static

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: JustAsPlanned
        path: |
          patch_ga.exe
          patch_li.exe
