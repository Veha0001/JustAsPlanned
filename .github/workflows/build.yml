name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  Build:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x64, x86]

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Build
      shell: bash
      run: |
        # Set resource object file based on architecture
        if [ "${{ matrix.architecture }}" == "x64" ]; then
          windres resource.rc -o resource.o
          g++ -m64 patch_ga.cpp resource.o -o patch_ga.exe -static
          g++ -m64 patch_li.cpp resource.o -o patch_li.exe -static
        else
          windres resource.rc -o resource.o
          g++ -m32 patch_ga.cpp resource.o -o patch_ga.exe -static -lkernel32
          g++ -m32 patch_li.cpp resource.o -o patch_li.exe -static -lkernel32
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: JustAsPlanned-${{ matrix.architecture }}
        path: |
          patch_ga.exe
          patch_li.exe
